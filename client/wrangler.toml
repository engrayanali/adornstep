# Cloudflare Pages Configuration
name = "adornsteps"
compatibility_date = "2024-01-01"

[build]
command = "npm run build"
cwd = "."
watch_dir = "app"

[build.upload]
format = "service-worker"

[[redirects]]
from = "/admin/*"
to = "/admin/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
